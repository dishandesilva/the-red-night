<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to The Red Knight Game and continue your adventure in this online action platform game.">
    <meta name="keywords" content="The Red Knight, Red Knight, The Red Knight Game, Red Night, The Read Night, game login">
    <meta name="robots" content="index, follow">
    <meta name="author" content="DS DE SILVA CREATIONS">
    <meta property="og:title" content="Log in | The Red Knight Game">
    <meta property="og:description" content="Log in to The Red Knight Game and continue your adventure.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="icon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Log in | The Red Knight Game">
    <meta name="twitter:description" content="Access The Red Knight Game login page.">
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="bootstrap.css"/>
    <link rel="stylesheet" href="style2.css">
    <link rel="icon" href="icon.ico"/>
    <title>Log in | The Red Knight Game</title>
    
</head>
<body>
    <div class="loader-wrapper">
        <div class="loader">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
    </div>
    <div class="content hidden">
<div class="body">
    <div class="opacity-75">...
    <!----------------------- Main Container -------------------------->

     <div class="container d-flex justify-content-center align-items-center min-vh-100">

    <!----------------------- Login Container -------------------------->

       <div class="row border rounded-5 p-3 bg-black shadow box-area">

    <!--------------------------- Left Box ----------------------------->

       <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box" style="background: #121212;">
           <div class="featured-image mb-3">
             <div class="inner rounded-4">
              <video width="100%" autoplay controls loop>
                <source src="r1.mp4" type="video/mp4">
              </video>
            </div>
           </div>
           <p class="text-white fs-1" style="font-family: 'sans-serif'; font-weight: 600;">The Red Knight</p>
           <small class="text-white text-wrap text-center" style="width: 17rem;font-family: 'Courier New', Courier, monospace;">Login for a better experience.</small>
       </div> 

    <!--------------------------- Right Box ---------------------------->
        
       <div class="col-md-6 right-box">
          <div class="row align-items-center">
                <div class="header-text mb-4">
                     <h2 class="text-white fs-1" style="font-family: 'sans-serif'; font-weight: 600;">Welcome to The Red Knight Game!</h2>
                     <p class="text-white fs-6" style="font-family: 'sans-serif';">Join the band of knights to experience a true knighthood.</p>
                </div>

                <div class="input-group mb-3">
                    <input type="text" color class="form-control form-control-lg bg-secondary fs-6 text-dark" placeholder="User name or email address">
                </div>
                <div class="input-group mb-1">
                    <input type="password" class="form-control form-control-lg bg-secondary fs-6 text-dark" placeholder="Password">
                </div>
                <div class="input-group mb-5 d-flex justify-content-between">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="formCheck">
                        <label for="formCheck" class="form-check-label text-white"><small>Remember Me</small></label>
                    </div>
                    <div class="forgot">
                        <small><a href="password.html">Forgot Password?</a></small>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <button onclick="window.location='index2.html';" class="btn btn-lg btn-danger w-100 fs-6"><img src="l1.png" style="width:20px" class="me-2">Login</button>
                </div>
                
                
                
                <div class="input-group mb-3">
                    <button  onclick="window.location='index2.html';" class="btn btn-lg btn-primary w-100 fs-6"><img src="icon.ico" style="width:20px" class="me-2"><small>FREE TRIAL</small></button>
                </div>
                
                

                <div class="row">
                    <small class= text-white>Don't have an account? <a href="signup.html">Register to the band of Knights</a></small>
                </div>
          </div>
       </div> 

      </div>
    </div>
</div>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
