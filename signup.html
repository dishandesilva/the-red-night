<html lang="en">

    <title>Sign up | The Red Knight Game</title>

<body>
    
<div class="body">
    <div class="opacity-75">...
    <!----------------------- Main Container -------------------------->

     <div class="container d-flex justify-content-center align-items-center min-vh-100">

    <!----------------------- Login Container -------------------------->

       <div class="row border rounded-5 p-3 bg-black shadow box-area">

    <!--------------------------- Left Box ----------------------------->

       <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box" style="background: #121212;">
           <div class="featured-image mb-3">
            <div class="inner rounded-4">
                <img src="knight1.gif" class="img-fluid" style="width: 100%;">
            </div>
           </div>
           <p class="text-white fs-1" style="font-family: 'sans-serif'; font-weight: 600;">The Red Knight </p>
           <small class="text-white text-wrap text-center" style="width: 17rem;font-family: 'Courier New', Courier, monospace;">Join the band of knights to experience a true knighthood.</small>
       </div> 

    <!-------------------- ------ Right Box ---------------------------->
        
       <div class="col-md-6 right-box">
          <div class="row align-items-center">
                <div class="header-text mb-4">
                     <h2 class="text-white fs-1" style="font-family: 'sans-serif'; font-weight: 600;">Sign up</h2>
                     <p class="text-white fs-6" style="font-family: 'sans-serif';">Sign up for a better experience.</p>
                </div>

                <div class="input-group mb-3">
                    <input type="text" color class="form-control form-control-lg bg-secondary fs-6 text-dark" placeholder="User name">
                </div>
                <div class="input-group mb-3">
                    <input type="text" color class="form-control form-control-lg bg-secondary fs-6 text-dark" placeholder="Email address">
                </div>
                <div class="input-group mb-3">
                    <input type="password"  class="form-control form-control-lg bg-secondary fs-6 text-dark" placeholder="Password">
                </div>
                <div class="input-group mb-3">
                    <input type="password"  class="form-control form-control-lg bg-secondary fs-6 text-dark" placeholder="Confirm password">
                </div>
                <div></div><br>
                <div class="row">
                    <small class= text-white>By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.</small>
                </div>
                <div></div><br>
                <div class="input-group mb-3">
                    <button  onclick="window.location='index.html';"  class="btn btn-lg btn-danger w-100 fs-6"><img src="l1.png" style="width:20px" class="me-2">Sign up</button>
                </div>


                <div class="input-group mb-3">
                    <button  onclick="window.location='index.html';"  class="btn btn-lg btn-primary w-100 fs-6"><img src="icon.ico" style="width:20px" class="me-2"><small>FREE TRIAL</small></button>
                </div>

              
                <div class="row">
                    <small class= text-white>Already have an account? <a href="index.html">Log in</a></small>
                </div>
          </div>
       </div> 

      </div>
    </div>
</div>
